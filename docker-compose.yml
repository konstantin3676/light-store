services:
  products_db:
    image: postgres:17
    container_name: products_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - products_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  products:
    build:
      context: ./products
      dockerfile: Dockerfile
    container_name: products
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./products/src:/app/src
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@products_db:5432/postgres
    depends_on:
      products_db:
        condition: service_healthy

  orders_db:
    image: postgres:17
    container_name: orders_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  orders:
    build:
      context: ./orders
      dockerfile: Dockerfile
    container_name: orders
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./orders/src:/app/src
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@orders_db:5432/postgres
    depends_on:
      orders_db:
        condition: service_healthy

volumes:
  products_data:
  orders_data:
